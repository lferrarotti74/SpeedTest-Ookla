name: Dependabot Reviewer

on:
  pull_request_target:
    branches: [dev]

permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot-review:
    uses: lferrarotti74/github-workflows-templates/.github/workflows/dependabot-reviewer.yml@a6fd45c13dee2a510af7e211d7ef482266010119
    with:
      auto_merge: true
    secrets:
      REPO_TOKEN: ${{ secrets.REPO_TOKEN }}  # 👈 pass your PAT here
