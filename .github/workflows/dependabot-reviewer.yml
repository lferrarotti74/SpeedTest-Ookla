name: Dependabot Reviewer

on:
  pull_request_target:
    branches: [dev]

permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot-review:
    uses: lferrarotti74/github-workflows-templates/.github/workflows/dependabot-reviewer.yml@998b03d8316058c585fe5c52d5b2654e2cc7bb43
    with:
      auto_merge: true
    secrets:
      REPO_TOKEN: ${{ secrets.REPO_TOKEN }}  # 👈 pass your PAT here
